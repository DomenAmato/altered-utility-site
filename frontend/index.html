<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Altered Utility Professional</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <nav id="main-nav">
        <a onclick="showPage('extractor')">Estrattore Deck</a>
        <a id="admin-nav-link" onclick="showPage('admin')">Gestione Database</a>
    </nav>

    <div id="admin" class="page"></div>

    <div id="extractor" class="page active">
        <h2>Altered Deck Utility</h2>
        <input type="text" id="deckUrl" placeholder="Incolla Link Share o ID Deck...">
        <div class="btn-group">
            <button class="btn-extract" onclick="fetchDeck()">ESTRAI</button>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">COPIA TESTO</button>
        </div>
        <table id="resultTable" style="display:none;">
            <thead><tr><th>Qtà</th><th>Codice Carta</th></tr></thead>
            <tbody id="cardList"></tbody>
        </table>
    </div>

    <div id="admin" class="page">
    <h2>Gestione Database per Espansione</h2>
    <button class="btn-extract" onclick="updateServerDB()">Aggiorna tutti i file sul Server</button>
    <p id="adminStatus" style="white-space: pre-line;"></p>
    
    <hr>
    <h3>Scarica JSON su PC</h3>
    <div id="downloadButtons" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn-copy" onclick="downloadSet('CORE')">Beyond the Gates</button>
        <button class="btn-copy" onclick="downloadSet('ALIZE')">Trial by the Frost</button>
        <button class="btn-copy" onclick="downloadSet('BISE')">Whispers from the Maze</button>
        <button class="btn-copy" onclick="downloadSet('CYCLONE')">Skybound Odissey</button>
        <button class="btn-copy" onclick="downloadSet('DUSTER')">Seeds of Unity</button>
        <button class="btn-copy" onclick="downloadSet('EOLE')">Roots of Corruption</button>
    </div>
</div>
</div>

<script src="js/app.js">

    
</script>
</body>
</html>
