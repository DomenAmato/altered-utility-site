<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Altered Utility Professional</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
    <nav>
        <a onclick="showPage('extractor')">Estrattore Deck</a>
        <a onclick="showPage('admin')">Gestione Database</a>
    </nav>

    <div id="extractor" class="page active">
        <h2>Altered Deck Utility</h2>
        <input type="text" id="deckUrl" placeholder="Incolla Link Share o ID Deck...">
        <div class="btn-group">
            <button class="btn-extract" onclick="fetchDeck()">ESTRAI</button>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">COPIA TESTO</button>
        </div>
        <table id="resultTable" style="display:none;">
            <thead><tr><th>Qtà</th><th>Codice Carta</th></tr></thead>
            <tbody id="cardList"></tbody>
        </table>
    </div>

    <div id="admin" class="page">
        <h2>Gestione Dati</h2>
        <p>Scarica l'intero database di Altered TCG (JSON) sul server e poi salvalo sul tuo PC.</p>
        <button class="btn-extract" onclick="updateServerDB()">1. Aggiorna Database sul Server</button>
        <br><br>
        <button class="btn-copy" style="display:inline-block;" onclick="downloadJSON()">2. Scarica JSON sul PC</button>
        <p id="adminStatus"></p>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
