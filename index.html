<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Altered Extractor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #eceff1; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-extract { background: #1a73e8; color: white; }
        .btn-copy { background: #34a853; color: white; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h2>Altered Deck Utility</h2>
    <input type="text" id="deckUrl" placeholder="Incolla Link Share o ID Deck...">
    
    <div class="btn-group">
        <button class="btn-extract" onclick="fetchDeck()">ESTRAI</button>
        <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">COPIA TESTO</button>
    </div>

    <h3 id="deckTitle" style="margin-top: 20px;"></h3>
    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Qtà</th>
                <th>Codice Carta</th>
            </tr>
        </thead>
        <tbody id="cardList"></tbody>
    </table>
</div>

<script>
    let currentDeckText = "";

    async function fetchDeck() {
        const input = document.getElementById('deckUrl').value;
        // CORRETTO (cerca il server sullo stesso dominio dove si trova l'HTML)
        const deckId = input.includes('/') ? input.split('/').filter(Boolean).pop() : input;
        const response = await fetch(`/api/deck?url=${encodeURIComponent(deckId)}`);
        const data = await response.json();

        if (data.error) {
            alert(data.error);
            return;
        }

        document.getElementById('deckTitle').innerText = data.name;
        const tbody = document.getElementById('cardList');
        tbody.innerHTML = '';
        currentDeckText = ""; // Reset testo per copia

        data.cards.forEach(c => {
            // Popoliamo la tabella
            const row = `<tr><td>${c.quantity}x</td><td>${c.code}</td></tr>`;
            tbody.innerHTML += row;
            
            // Prepariamo il testo piano (es: 3x ALT_CORE_B_YZ_01_R)
            currentDeckText += `${c.quantity}x ${c.code}\n`;
        });

        document.getElementById('resultTable').style.display = 'table';
        document.getElementById('copyBtn').style.display = 'block';
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(currentDeckText).then(() => {
            alert("Lista copiata negli appunti!");
        });
    }
</script>
</body>
</html>
