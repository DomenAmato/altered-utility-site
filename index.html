<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Altered Utility Professional</title>
    <style>
        /* Aggiungiamo un po' di stile per il menu */
        nav { background: #333; padding: 10px; margin-bottom: 20px; border-radius: 8px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; cursor: pointer; }
        .page { display: none; }
        .active { display: block; }
        /* ... (tutto lo stile precedente) ... */
    </style>
</head>
<body>

<div class="container">
    <nav>
        <a onclick="showPage('extractor')">Estrattore Deck</a>
        <a onclick="showPage('admin')">Gestione Database</a>
    </nav>

    <div id="extractor" class="page active">
        <h2>Altered Deck Utility</h2>
        <input type="text" id="deckUrl" placeholder="Incolla Link Share o ID Deck...">
        <div class="btn-group">
            <button class="btn-extract" onclick="fetchDeck()">ESTRAI</button>
            <button id="copyBtn" class="btn-copy" onclick="copyToClipboard()">COPIA TESTO</button>
        </div>
        <table id="resultTable" style="display:none;">
            <thead><tr><th>Qtà</th><th>Codice Carta</th></tr></thead>
            <tbody id="cardList"></tbody>
        </table>
    </div>

    <div id="admin" class="page">
        <h2>Gestione Dati</h2>
        <p>Scarica l'intero database di Altered TCG (JSON) sul server e poi salvalo sul tuo PC.</p>
        <button class="btn-extract" onclick="updateServerDB()">1. Aggiorna Database sul Server</button>
        <br><br>
        <button class="btn-copy" style="display:inline-block;" onclick="downloadJSON()">2. Scarica JSON sul PC</button>
        <p id="adminStatus"></p>
    </div>
</div>

<script>
    // Gestione Pagine
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // Funzioni Admin
    async function updateServerDB() {
        const status = document.getElementById('adminStatus');
        status.innerText = "Aggiornamento in corso... attendere (potrebbe volerci un minuto)";
        try {
            const response = await fetch('/api/admin/update-db');
            const data = await response.json();
            status.innerText = data.message || data.error;
        } catch (e) { status.innerText = "Errore di connessione."; }
    }

    function downloadJSON() {
        window.location.href = '/api/admin/download-json';
    }

    // ... (qui incolla le funzioni fetchDeck e copyToClipboard di prima) ...
</script>
</body>
</html>
